algorithm:
  name: "mappo"
  shared:
    num_iterations: 300
    checkpoint_freq: 100
    batch_size: 4000
    num_epochs: 3
    num_minibatches: 4
    learning_rate: 0.0007598648793612028
    num_env_runners: 2
    num_envs_per_env_runner: 10
    num_cpus_per_env_runner: 1
    eval_interval: 5
    num_eval_episodes: 5  
    evaluation_parallel_to_training: false

  algorithm_specific:
    use_gae: true
    lam: 0.95
    gamma: 0.99
    use_kl_loss: true
    grad_clip: 20
    entropy_coeff: 0.005422636942319648
    vf_loss_coeff: 0.836257527392694
    clip_param: 0.3
    vf_clip_param: 2046.8403482088547
    logstd_init: -1.4184384587167504
    logstd_floor: -3.51636237623627
    obs_normalization: "meanstd_custom"
    parameter_sharing: true
    actor_obs_type: "local"
    critic_obs_type: "global"
    networks:
      shared_layers: null
        #type: "gru"
        #config:
        #  num_layers: 2
        #  hidden_size: 128
        #  bidirectional: false
        #  output_dim: 128
        #  max_seq_len: 20
      use_mu_sigma_head: false
      actor:
        type: "mlp"
        config:        
          hidden_sizes: [256, 256]
          activation: "relu"
          output_activation: null
          # output_dim: null
      critic:
        type: "mlp"
        config:
          hidden_sizes: [64, 64]
          activation: "relu"
          output_activation: null
          # output_dim: null


