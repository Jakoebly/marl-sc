algorithm:
  name: "ippo"
  shared:
    num_iterations: 300
    checkpoint_freq: 100
    batch_size: 4000
    num_epochs: 15
    num_minibatches: 4
    learning_rate: 0.000307235166535234
    num_env_runners: 2
    num_envs_per_env_runner: 10
    num_cpus_per_env_runner: 1
    eval_interval: 5  
    num_eval_episodes: 5  
    evaluation_parallel_to_training: false

  algorithm_specific:
    use_gae: true
    lam: 0.95
    gamma: 0.99
    use_kl_loss: false
    grad_clip: 10
    entropy_coeff: 0.0016691489138332635
    vf_loss_coeff: 0.7698963105417195
    clip_param: 0.2
    vf_clip_param: 100000000000
    logstd_init: 0
    logstd_floor: -100000000000
    obs_normalization: "meanstd_grouped"
    parameter_sharing: true
    actor_obs_type: "local"
    critic_obs_type: "local"
    networks:
      shared_layers: null
        #type: "gru"
        #config:
        #  num_layers: 2
        #  hidden_size: 128
        #  bidirectional: false
        #  output_dim: 128
        #  max_seq_len: 20
      use_mu_sigma_head: false
      actor:
        type: "mlp"
        config:        
          hidden_sizes: [64, 64]
          activation: "relu"
          output_activation: null
      critic:
        type: "mlp"
        config:
          hidden_sizes: [256, 256]
          activation: "relu"
          output_activation: null

