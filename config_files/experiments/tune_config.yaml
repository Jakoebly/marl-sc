search_space:
  # --- Shared (algorithm-agnostic) hyperparameters ---
  shared:
    learning_rate:
      type: loguniform
      low: 5e-5
      high: 3e-3
    batch_size:
      type: choice
      values: [4000, 8000, 16000]
    num_epochs:
      type: choice
      values: [3, 5, 10, 15, 20]
    num_minibatches:
      type: choice
      values: [1, 4, 10, 20]

  # --- Algorithm-specific hyperparameters ---
  algorithm_specific:
    lam:
      type: choice
      values: [0.9, 0.95, 0.97, 0.99]
    gamma:
      type: choice
      values: [0.95, 0.99, 0.995]
    use_kl_loss:
      type: choice
      values: [1, 0]
    grad_clip:
      type: choice
      values: [5.0, 10.0, 20.0, 40.0, 100000]
    entropy_coeff:
      type: loguniform
      low: 0.001
      high: 0.1
    vf_loss_coeff:
      type: uniform
      low: 0.1
      high: 1.2
    clip_param:
      type: choice
      values: [0.1, 0.2, 0.3]
    vf_clip_param:
      type: loguniform
      low: 10
      high: 10000
    logstd_init:
      type: uniform
      low: -1.5
      high: 0.0
    logstd_floor:
      type: uniform
      low: -4.0
      high: -1.5
    # parameter_sharing:
    #   type: choice
    #   values: [0, 1]
    actor_hidden_size:
      type: choice
      values: [64, 128, 256, 512, 1024,"64_64", "128_128", "256_256", "128_256", "256_128", "512_512"]
    critic_hidden_size:
      type: choice
      values: [64, 128, 256, 512, 1024, "64_64", "128_128", "256_256", "128_256", "256_128", "512_512"]

  # --- Observation-space feature toggles (1=on, 0=off) ---
  features:
    incoming_demand_home:
      type: choice
      values: [1, 0]
    units_shipped_home:
      type: choice
      values: [1, 0]
    units_shipped_away:
      type: choice
      values: [1, 0]
    demand_forecast:
      type: choice
      values: [1, 0]
    days_of_supply:
      type: choice
      values: [1, 0]
    net_inventory_position:
      type: choice
      values: [1, 0]
    demand_history:
      type: choice
      values: [1, 0]
    demand_variability:
      type: choice
      values: [1, 0]
    pipeline_aggregate:
      type: choice
      values: [1, 0]

scheduler:
  type: fifo

search_algorithm:
  type: optuna
