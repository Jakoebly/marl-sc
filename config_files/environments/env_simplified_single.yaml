environment:
  n_warehouses: 1
  n_skus: 1
  n_regions: 1
  episode_length: 100
  action_space:
    type: "direct"
    params:
      max_order_quantities: 
        - 40
  max_wh_capacities:
    - 10000000
  initial_inventory:
    type: "custom"
    params:
      values:
        - [30]
  cost_structure:
    holding_cost: 1.0
    penalty_cost:
      - 5
    shipment_cost:
      outbound_fixed:
        - [0]
      outbound_variable:
        - [0.5]
      inbound_fixed:
        - [0]
      inbound_variable:
        - [1.0]
    sku_weights:
      - 1.0
    distances:
      - [50]
  components:
    demand_sampler:
      type: "poisson"
      params:
        lambda_orders:
          - 4
        probability_skus:
          - 0.667
        lambda_quantity:
          - [5]
    demand_allocator:
      type: "greedy"
      params:
        max_splits: "default"
    lead_time_sampler:
      type: "fixed"
      params:
        expected_lead_times:
          - [3]
    lost_sales_handler:
      type: "shipment"
      params: null
    reward_calculator:
      type: "cost"
      params:
        scope: "agent"
        scale_factor: 0.01
        cost_weights:
          - 0.25
          - 0.25
          - 0.25
          - 0.25
  data_source:
    type: "custom"